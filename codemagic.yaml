workflows:
  ios-build:
    name: iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Build app
        script: |
          xcodebuild -scheme ivangram -configuration Release -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO SYMROOT=build build
      - name: Create IPA
        script: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/ivangram.app Payload/
          zip -r ivangram.ipa Payload/
    artifacts:
      - ivangram.ipa
