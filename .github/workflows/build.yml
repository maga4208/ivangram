name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          xcodebuild -project ivangram.xcodeproj -scheme ivangram -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            SYMROOT=build build

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/ivangram.app Payload/
          zip -r ivangram.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ivangram
          path: ivangram.ipa
